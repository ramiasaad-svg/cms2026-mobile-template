name: cms2026_mobile
description: CMS2026 Dynamic Mobile Template — data-driven app shell powered by CMS API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1

  # UI
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0-beta.2
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2

  # Utils
  intl: ^0.19.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  connectivity_plus: ^6.1.2
  package_info_plus: ^8.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/images/
